volumes:
##### POSTGRES
  postgres-data:
##### PGADMIN
  pgadmin-data:
##### KEYCLOAK
  keycloak-data:
##### OPENSEARCH
  opensearch-data:
##### REDIS
  redis-data:

services:
##### POSTGRESQL #####
  db:
    image: postgres:18.3
    restart: unless-stopped
    shm_size: 1024mb
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
     - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3

##### PGADMIN #####
  pgadmin:
    image: dpage/pgadmin4:9.12.0
    volumes:
     - ./infrastructure/docker/pgadmin/servers.json:/pgadmin4/servers.json:ro
     - pgadmin-data:/var/lib/pgadmin
    environment:
      - PGADMIN_DEFAULT_EMAIL=${PGADMIN_DEFAULT_EMAIL}
      - PGADMIN_DEFAULT_PASSWORD=${PGADMIN_DEFAULT_PASSWORD}
    depends_on:
      db:
        condition: service_healthy
      keycloak-db:
        condition: service_healthy

##### REDIS #####
  redis:
    image: redis:8.6.1
    restart: unless-stopped
    volumes:
      - redis-data:/data

##### KEYCLOAK DATABASE #####
  keycloak-db:
    image: postgres:18.3
    restart: unless-stopped
    shm_size: 128mb
    environment:
      POSTGRES_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD}
      POSTGRES_USER: ${KEYCLOAK_POSTGRES_USER}
      POSTGRES_DB: ${KEYCLOAK_POSTGRES_DB}
      POSTGRES_INITDB_ARGS: "--data-checksums"
    volumes:
     - keycloak-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEYCLOAK_POSTGRES_USER} -d ${KEYCLOAK_POSTGRES_DB}"]
      interval: 30s
      timeout: 10s
      retries: 3

##### KEYCLOAK #####
  keycloak:
    image: quay.io/keycloak/keycloak:26.5.4
    restart: unless-stopped
    depends_on:
      keycloak-db:
        condition: service_healthy
    environment:
      KC_HOSTNAME_PORT: ${INTERNAL_HTTPHTTP}
      KC_HEALTH_ENABLED: true
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD}
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://keycloak-db:${INTERNAL_POSTGRES}/${KEYCLOAK_POSTGRES_DB}
      KC_DB_USERNAME: ${KEYCLOAK_POSTGRES_USER}
      KC_DB_PASSWORD: ${KEYCLOAK_POSTGRES_PASSWORD}

##### OPENSEARCH #####
  opensearch-node:
    image: opensearchproject/opensearch:3.5.0
    environment:
      - cluster.name=opensearch-cluster
      - node.name=opensearch-node
      - discovery.seed_hosts=opensearch-node
      - cluster.initial_cluster_manager_nodes=opensearch-node
      - bootstrap.memory_lock=true
      - "OPENSEARCH_JAVA_OPTS=-Xms512m -Xmx512m"
      - OPENSEARCH_INITIAL_ADMIN_PASSWORD=${OPENSEARCH_INITIAL_ADMIN_PASSWORD}
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    volumes:
      - opensearch-data:/usr/share/opensearch/data
##### dashboard
  opensearch-dashboards:
    image: opensearchproject/opensearch-dashboards:3.5.0
    depends_on:
     - opensearch-node
    environment:
      OPENSEARCH_HOSTS: '["http://opensearch-node:${INTERNAL_OPENSEARCH_NODE_P1}"]'
